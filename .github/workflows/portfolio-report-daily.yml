name: Tagesbericht – Portfolio & Aktien

on:
  schedule:
    # Jeden Werktag um 22:00 UTC (nach NYSE-Schluss, ca. 00:00 Uhr DE-Zeit)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Nur Test-Lauf (kein Versand)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  send-daily-report:
    name: Tagesbericht versenden
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: Moneta-main

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Moneta-main/package-lock.json

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Portfolio-Tagesbericht ausführen
        env:
          MONETA_SUPABASE_URL:              ${{ secrets.MONETA_SUPABASE_URL }}
          MONETA_SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.MONETA_SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY:                    ${{ secrets.RESEND_API_KEY }}
          ALPHA_VANTAGE_API_KEY:             ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          GEMINI_API_KEY:                    ${{ secrets.GEMINI_API_KEY }}
          APP_URL:                           ${{ secrets.APP_URL }}
          EMAIL_FROM:                        ${{ secrets.EMAIL_FROM }}
        run: npm run report:daily
