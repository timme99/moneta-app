name: Tagesbericht – Portfolio & Aktien

on:
  schedule:
    # Jeden Werktag um 18:30 UTC (20:30 Uhr DE-Sommerzeit / 19:30 Uhr Winterzeit)
    - cron: '30 18 * * 1-5'
  workflow_dispatch:
    inputs:
      type:
        description: 'Berichtstyp (daily/weekly)'
        required: false
        default: 'daily'

jobs:
  send-daily-report:
    name: Tagesbericht versenden
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: Moneta-main

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Moneta-main/package-lock.json

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Secrets prüfen
        run: |
          missing=""
          [ -z "$MONETA_SUPABASE_URL" ]              && missing="$missing MONETA_SUPABASE_URL"
          [ -z "$MONETA_SUPABASE_SERVICE_ROLE_KEY" ] && missing="$missing MONETA_SUPABASE_SERVICE_ROLE_KEY"
          [ -z "$RESEND_API_KEY" ]                   && missing="$missing RESEND_API_KEY"
          if [ -n "$missing" ]; then
            echo "❌ Fehlende Secrets:$missing"
            exit 1
          fi
          echo "✅ Alle Pflicht-Secrets vorhanden"
        env:
          MONETA_SUPABASE_URL:             ${{ secrets.MONETA_SUPABASE_URL }}
          MONETA_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MONETA_SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY:                  ${{ secrets.RESEND_API_KEY }}

      - name: Portfolio-Tagesbericht ausführen
        id: report
        run: npm run report:daily
        env:
          MONETA_SUPABASE_URL:             ${{ secrets.MONETA_SUPABASE_URL }}
          MONETA_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MONETA_SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY:                  ${{ secrets.RESEND_API_KEY }}
          ALPHA_VANTAGE_API_KEY:           ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          GEMINI_API_KEY:                  ${{ secrets.GEMINI_API_KEY }}
          EMAIL_FROM:                      ${{ secrets.EMAIL_FROM }}
          APP_URL:                         ${{ secrets.APP_URL }}

      - name: Zusammenfassung
        if: always()
        run: |
          echo "## 📊 Tagesbericht – Moneta" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Typ** | Tagesbericht (daily) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Datum** | $(date -u '+%d.%m.%Y %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
