name: Portfolio & Aktien Report (Manuell)

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: "Report-Typ"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly

jobs:
  send-report:
    name: Portfolio-Report versenden
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: Moneta-main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Moneta-main/package-lock.json

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Portfolio-Report ausführen (${{ github.event.inputs.report_type }})
        run: npx tsx scripts/portfolio-report.ts --type ${{ github.event.inputs.report_type }}
        env:
          MONETA_SUPABASE_URL: ${{ secrets.MONETA_SUPABASE_URL }}
          MONETA_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MONETA_SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          APP_URL: ${{ secrets.APP_URL }}
