name: Portfolio & Aktien Report

on:
  schedule:
    # Tagesbericht – Mo–Fr um 17:30 UTC (19:30 Uhr CEST / 18:30 Uhr CET, nach EU-Börsenschluss)
    - cron: "30 17 * * 1-5"
    # Wochenbericht – montags 07:00 UTC (09:00 Uhr CEST / 08:00 Uhr CET)
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      report_type:
        description: "Report-Typ"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly

# Verhindert parallele Läufe desselben Workflows (kein Doppelversand)
concurrency:
  group: portfolio-report
  cancel-in-progress: false

jobs:
  send-report:
    name: Portfolio-Report versenden
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: Moneta-main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Moneta-main/package-lock.json

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Report-Typ bestimmen
        id: type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.report_type }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%H:%M)" = "07:00" ] && [ "$(date -u +%u)" = "1" ]; then
            echo "type=weekly" >> $GITHUB_OUTPUT
          else
            echo "type=daily" >> $GITHUB_OUTPUT
          fi

      - name: Portfolio-Report ausführen (${{ steps.type.outputs.type }})
        run: npx tsx scripts/portfolio-report.ts --type ${{ steps.type.outputs.type }}
        env:
          MONETA_SUPABASE_URL:              ${{ secrets.MONETA_SUPABASE_URL }}
          MONETA_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MONETA_SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY:                   ${{ secrets.GEMINI_API_KEY }}
          ALPHA_VANTAGE_API_KEY:            ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          RESEND_API_KEY:                   ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM:                       ${{ secrets.EMAIL_FROM }}
          APP_URL:                          ${{ secrets.APP_URL }}
