name: Portfolio & Aktien Report (manuell)

# Nur manueller Trigger – die automatischen Läufe übernehmen
# portfolio-report-daily.yml  (Mo–Fr 18:30 UTC)
# portfolio-report-weekly.yml (Mo   07:00 UTC)
on:
  workflow_dispatch:
    inputs:
      report_type:
        description: "Report-Typ"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly

jobs:
  send-report:
    name: Portfolio-Report versenden (${{ github.event.inputs.report_type }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: Moneta-main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Moneta-main/package-lock.json

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Secrets prüfen
        run: |
          missing=""
          [ -z "$MONETA_SUPABASE_URL" ]              && missing="$missing MONETA_SUPABASE_URL"
          [ -z "$MONETA_SUPABASE_SERVICE_ROLE_KEY" ] && missing="$missing MONETA_SUPABASE_SERVICE_ROLE_KEY"
          [ -z "$RESEND_API_KEY" ]                   && missing="$missing RESEND_API_KEY"
          if [ -n "$missing" ]; then
            echo "❌ Fehlende Secrets:$missing"
            exit 1
          fi
          echo "✅ Alle Pflicht-Secrets vorhanden"
        env:
          MONETA_SUPABASE_URL:             ${{ secrets.MONETA_SUPABASE_URL }}
          MONETA_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MONETA_SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY:                  ${{ secrets.RESEND_API_KEY }}

      - name: Portfolio-Report ausführen
        id: report
        run: npx tsx scripts/portfolio-report.ts --type ${{ github.event.inputs.report_type }}
        env:
          MONETA_SUPABASE_URL:             ${{ secrets.MONETA_SUPABASE_URL }}
          MONETA_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MONETA_SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY:                  ${{ secrets.RESEND_API_KEY }}
          ALPHA_VANTAGE_API_KEY:           ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          GEMINI_API_KEY:                  ${{ secrets.GEMINI_API_KEY }}
          EMAIL_FROM:                      ${{ secrets.EMAIL_FROM }}
          APP_URL:                         ${{ secrets.APP_URL }}

      - name: Zusammenfassung
        if: always()
        run: |
          echo "## 📊 Moneta Portfolio-Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Typ** | ${{ github.event.inputs.report_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Gestartet von** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Datum** | $(date -u '+%d.%m.%Y %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
