name: Portfolio & Aktien Report

on:
  schedule:
    # Tagesbericht – Mo–Fr um 18:30 UTC (20:30 Uhr CEST / 19:30 Uhr MEZ)
    - cron: '30 18 * * 1-5'
    # Wochenbericht – Montag 07:00 UTC (09:00 Uhr CEST)
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Report-Typ'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly

jobs:
  send-report:
    name: Portfolio-Report versenden
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: Moneta-main

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Moneta-main/package-lock.json

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Report-Typ bestimmen
        id: type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.report_type }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%H)" = "07" ] && [ "$(date +%u)" = "1" ]; then
            echo "type=weekly" >> $GITHUB_OUTPUT
          else
            echo "type=daily" >> $GITHUB_OUTPUT
          fi

      - name: Portfolio-Report ausführen (${{ steps.type.outputs.type }})
        run: npx tsx scripts/portfolio-report.ts --type ${{ steps.type.outputs.type }}
        env:
          MONETA_SUPABASE_URL:              ${{ secrets.MONETA_SUPABASE_URL }}
          MONETA_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MONETA_SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY:                   ${{ secrets.RESEND_API_KEY }}
          ALPHA_VANTAGE_API_KEY:            ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          GEMINI_API_KEY:                   ${{ secrets.GEMINI_API_KEY }}
          APP_URL:                          ${{ secrets.APP_URL }}
          EMAIL_FROM:                       ${{ secrets.EMAIL_FROM }}
